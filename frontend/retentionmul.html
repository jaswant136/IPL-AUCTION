// =========================
// LOAD PLAYERS
// =========================

const grid =
document.getElementById(
"retention-grid"
);

const teamPlayers =
retentionData[selectedTeam];

let retainedPlayers = [];

teamPlayers.forEach(player => {

grid.innerHTML += `

<div class="retention-player-card">

<div class="retention-player-img">

<img src="${player.image}">

</div>

<div class="retention-player-content">

<h2>
${player.name}
</h2>

<p>
${player.role}
</p>

<div class="retention-price">

₹${player.price} Cr

</div>

<button
onclick='toggleRetention(
${JSON.stringify(player)}
,this
)'
class="retain-btn">

RETAIN PLAYER

</button>

</div>

</div>

`;

});

// =========================
// TOGGLE RETENTION
// =========================

function toggleRetention(player,btn){

const exists =
retainedPlayers.find(
p => p.name === player.name
);

if(exists){

retainedPlayers =
retainedPlayers.filter(
p => p.name !== player.name
);

btn.innerText =
"RETAIN PLAYER";

btn.classList.remove(
"retained"
);

}else{

if(retainedPlayers.length >= 6){

alert(
"Maximum 6 retentions allowed"
);

return;
}

retainedPlayers.push(player);

btn.innerText =
"RETAINED";

btn.classList.add(
"retained"
);

}

updateRetention();
}

// =========================
// UPDATE
// =========================

function updateRetention(){

let spent = 0;

retainedPlayers.forEach(player => {

spent += player.price;

});

const remaining =
130 - spent;

document.getElementById(
"retention-count"
).innerText =
retainedPlayers.length;

document.getElementById(
"spent-money"
).innerText =
spent;

document.getElementById(
"remaining-money"
).innerText =
remaining;

document.getElementById(
"remaining-purse"
).innerText =
remaining;

document.getElementById(
"rtm-count"
).innerText =
6 - retainedPlayers.length;
}

// =========================
// FINALIZE
// =========================

async function finalizeRetention(){

    try{

        for(const player of retainedPlayers){

            await fetch(
                "http://127.0.0.1:5000/retain",
                {
                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({

                        team:selectedTeam,

                        player:player.name,

                        price:player.price

                    })
                }
            );

        }

        localStorage.setItem(
            "retainedPlayers",
            JSON.stringify(retainedPlayers)
        );

        window.location.href =
        "index.html";

    }catch(error){

        console.log(error);

        alert("Retention Failed");

    }

}
</script>
